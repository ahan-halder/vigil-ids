rules:
  - id: "BL-001"
    name: "Blocked IP"
    description: "Traffic from a known malicious IP"
    severity: critical
    action: alert
    condition:
      type: ip_blocklist
      src_ips:
        - "192.168.1.100"

  - id: "PS-001"
    name: "Port Scan Detected"
    description: "Multiple destination ports contacted in a short window"
    severity: high
    action: alert
    condition:
      type: port_scan
      threshold: 15
      window_secs: 10
